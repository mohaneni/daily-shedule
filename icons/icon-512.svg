<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="check-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Calendar Grid Shadow / Silhouette -->
  <rect x="122" y="150" width="268" height="240" rx="42" fill="#000" opacity="0.15" />
  
  <!-- Calendar Body -->
  <rect x="122" y="140" width="268" height="240" rx="42" fill="#ffffff" />
  
  <!-- Calendar Header Red/Teal Strip -->
  <path d="M122 182 V182 C122 160 140 140 162 140 H350 C372 140 390 160 390 182 V204 H122 Z" fill="#14b8a6" />
  
  <!-- Ring holes -->
  <circle cx="186" cy="140" r="13" fill="#047857" />
  <circle cx="326" cy="140" r="13" fill="#047857" />
  
  <!-- Binder Rings -->
  <path d="M186 112 C186 112 186 146 186 146" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round" />
  <path d="M326 112 C326 112 326 146 326 146" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round" />
  
  <!-- Checkmark/Flow inside calendar -->
  <path d="M180 274 L224 318 L330 210" fill="none" stroke="url(#check-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Little decorative clock or star -->
  <circle cx="326" cy="318" r="26" fill="#f59e0b" />
  <path d="M326 302 V318 H338" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
</svg>
